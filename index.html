<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LK Innovations</title>
<meta name="description" content="Making Miracles Happen.">
<meta property="og:title" content="LK Innovations">
<meta property="og:description" content="Making Miracles Happen.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://lkinnovations.org/">
<meta name="theme-color" content="#1a1612">
<link rel="icon" type="image/svg+xml" href="/lk.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { height: 100%; margin: 0; }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: #1a1612;
    color: #e8e0d0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding: 2rem;
    overflow: hidden;
  }
  .hero {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2.25rem;
  }
  .stage {
    position: relative;
    width: clamp(260px, 42vw, 440px);
    aspect-ratio: 105.12 / 108.73;
  }
  .glow {
    position: absolute;
    inset: -45%;
    z-index: 0;
    pointer-events: none;
    background: radial-gradient(
      circle at center,
      rgba(255, 215, 165, 0.55) 0%,
      rgba(255, 200, 140, 0.30) 25%,
      rgba(255, 190, 130, 0.10) 50%,
      transparent 70%
    );
    filter: blur(40px);
    opacity: 0.35;
    animation: glow-pulse 11s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    will-change: opacity, transform;
  }
  @keyframes glow-pulse {
    0%   { opacity: 0.35; transform: scale(1); }
    22%  { opacity: 1;    transform: scale(1.06); }
    45%  { opacity: 0.55; transform: scale(1.02); }
    100% { opacity: 0.35; transform: scale(1); }
  }
  .logo-mask {
    position: absolute;
    inset: 0;
    z-index: 1;
    -webkit-mask: url('lk.svg') center / contain no-repeat;
            mask: url('lk.svg') center / contain no-repeat;
    background: linear-gradient(180deg, #f5ead2 0%, #d8c8a4 55%, #b8a47c 100%);
  }
  .sheen-mask {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    overflow: hidden;
    -webkit-mask: url('lk.svg') center / contain no-repeat;
            mask: url('lk.svg') center / contain no-repeat;
  }
  .sheen-band {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      115deg,
      transparent 38%,
      rgba(255, 245, 220, 0.85) 50%,
      transparent 62%
    );
    animation: sheen 11s cubic-bezier(0.45, 0, 0.55, 1) infinite;
    will-change: transform;
  }
  @keyframes sheen {
    0%   { transform: translateX(-100%); }
    45%  { transform: translateX(100%); }
    100% { transform: translateX(100%); }
  }
  .tagline {
    margin: 0;
    font-weight: 300;
    font-size: clamp(0.75rem, 1.4vw, 0.92rem);
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: #d6cdbf;
  }
  @media (prefers-reduced-motion: reduce) {
    .sheen-band { animation: none; opacity: 0; }
    .glow { animation: none; opacity: 0.5; transform: scale(1.03); }
  }
</style>
</head>
<body>
  <main class="hero">
    <div class="stage">
      <div class="glow" aria-hidden="true"></div>
      <div class="logo-mask" role="img" aria-label="LK Innovations"></div>
      <div class="sheen-mask" aria-hidden="true">
        <div class="sheen-band"></div>
      </div>
    </div>
    <p class="tagline">Making Miracles Happen</p>
  </main>
</body>
</html>
